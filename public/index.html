<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6C3CE1">
  <meta name="description" content="AI가 분석하는 정확한 사주팔자 - 무료 사주, 궁합, 오늘의 운세, 신년운세">
  <title>사주포털 - AI 사주팔자</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- 로딩 스크린 -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-orb"></div>
    <div class="loading-text">사주포털 준비중<span class="dots"></span></div>
  </div>

  <!-- 헤더 -->
  <header class="app-header">
    <button class="header-back" id="backBtn" onclick="goHome()">←</button>
    <h1 id="headerTitle">사주포털</h1>
    <p class="subtitle" id="headerSubtitle">AI가 풀어주는 당신의 운명</p>
  </header>

  <!-- 메인 메뉴 -->
  <div class="main-menu page active" id="pageHome">
    <div class="hero-banner">
      <h2>✨ 당신의 사주팔자를<br>AI가 풀어드립니다</h2>
      <p>생년월일시만 입력하면 40년 경력급 분석을 무료로</p>
    </div>

    <div class="menu-grid">
      <div class="menu-card" onclick="openPage('basic')">
        <span class="icon">🔮</span>
        <div class="title">기본 사주</div>
        <div class="desc">성격, 직업, 재물, 연애운<br>종합 분석</div>
      </div>
      <div class="menu-card" onclick="openPage('today')">
        <span class="icon">📅</span>
        <div class="title">오늘의 운세</div>
        <div class="desc">오늘 하루<br>행운 가이드</div>
      </div>
      <div class="menu-card" onclick="openPage('compatibility')">
        <span class="icon">💕</span>
        <div class="title">사주 궁합</div>
        <div class="desc">두 사람의<br>인연 분석</div>
      </div>
      <div class="menu-card" onclick="openPage('newyear')">
        <span class="icon">🎆</span>
        <div class="title">2026 신년운세</div>
        <div class="desc">병오년<br>월별 운세</div>
      </div>
      <div class="menu-card featured" onclick="openPage('basic')">
        <span class="icon">⭐</span>
        <div class="title">지금 바로 내 사주 보기</div>
        <div class="desc">122,000명이 넘는 분들이 이미 확인했습니다</div>
      </div>
    </div>
  </div>

  <!-- 기본 사주 페이지 -->
  <div class="page" id="pageBasic">
    <div class="form-section" id="basicForm">
      <h3>🔮 기본 사주풀이</h3>
      <div class="gender-toggle">
        <button class="gender-btn active" data-gender="male" onclick="selectGender(this, 'basic')">👨 남성</button>
        <button class="gender-btn" data-gender="female" onclick="selectGender(this, 'basic')">👩 여성</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>태어난 해</label>
          <input type="number" id="basicYear" placeholder="1990" min="1920" max="2025">
        </div>
        <div class="form-group">
          <label>월</label>
          <select id="basicMonth">
            <option value="">월</option>
            <option value="1">1월</option><option value="2">2월</option>
            <option value="3">3월</option><option value="4">4월</option>
            <option value="5">5월</option><option value="6">6월</option>
            <option value="7">7월</option><option value="8">8월</option>
            <option value="9">9월</option><option value="10">10월</option>
            <option value="11">11월</option><option value="12">12월</option>
          </select>
        </div>
        <div class="form-group">
          <label>일</label>
          <input type="number" id="basicDay" placeholder="15" min="1" max="31">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>태어난 시간</label>
          <select id="basicHour">
            <option value="-1">모름</option>
            <option value="0">자시 (23:30~01:30)</option>
            <option value="1">축시 (01:30~03:30)</option>
            <option value="3">인시 (03:30~05:30)</option>
            <option value="5">묘시 (05:30~07:30)</option>
            <option value="7">진시 (07:30~09:30)</option>
            <option value="9">사시 (09:30~11:30)</option>
            <option value="11">오시 (11:30~13:30)</option>
            <option value="13">미시 (13:30~15:30)</option>
            <option value="15">신시 (15:30~17:30)</option>
            <option value="17">유시 (17:30~19:30)</option>
            <option value="19">술시 (19:30~21:30)</option>
            <option value="21">해시 (21:30~23:30)</option>
          </select>
        </div>
      </div>
      <div class="error-msg" id="basicError"></div>
      <button class="submit-btn" onclick="submitBasic()">내 사주 보기</button>
    </div>
    <div id="basicResult"></div>
  </div>

  <!-- 오늘의 운세 페이지 -->
  <div class="page" id="pageToday">
    <div class="form-section" id="todayForm">
      <h3>📅 오늘의 운세</h3>
      <div class="gender-toggle">
        <button class="gender-btn active" data-gender="male" onclick="selectGender(this, 'today')">👨 남성</button>
        <button class="gender-btn" data-gender="female" onclick="selectGender(this, 'today')">👩 여성</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>태어난 해</label>
          <input type="number" id="todayYear" placeholder="1990" min="1920" max="2025">
        </div>
        <div class="form-group">
          <label>월</label>
          <select id="todayMonth">
            <option value="">월</option>
            <option value="1">1월</option><option value="2">2월</option>
            <option value="3">3월</option><option value="4">4월</option>
            <option value="5">5월</option><option value="6">6월</option>
            <option value="7">7월</option><option value="8">8월</option>
            <option value="9">9월</option><option value="10">10월</option>
            <option value="11">11월</option><option value="12">12월</option>
          </select>
        </div>
        <div class="form-group">
          <label>일</label>
          <input type="number" id="todayDay" placeholder="15" min="1" max="31">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>태어난 시간</label>
          <select id="todayHour">
            <option value="-1">모름</option>
            <option value="0">자시 (23:30~01:30)</option>
            <option value="1">축시 (01:30~03:30)</option>
            <option value="3">인시 (03:30~05:30)</option>
            <option value="5">묘시 (05:30~07:30)</option>
            <option value="7">진시 (07:30~09:30)</option>
            <option value="9">사시 (09:30~11:30)</option>
            <option value="11">오시 (11:30~13:30)</option>
            <option value="13">미시 (13:30~15:30)</option>
            <option value="15">신시 (15:30~17:30)</option>
            <option value="17">유시 (17:30~19:30)</option>
            <option value="19">술시 (19:30~21:30)</option>
            <option value="21">해시 (21:30~23:30)</option>
          </select>
        </div>
      </div>
      <div class="error-msg" id="todayError"></div>
      <button class="submit-btn" onclick="submitToday()">오늘의 운세 보기</button>
    </div>
    <div id="todayResult"></div>
  </div>

  <!-- 궁합 페이지 -->
  <div class="page" id="pageCompatibility">

          <select id="compat1Month">
            <option value="">월</option>

            <option value="5">5월</option><option value="6">6월</option>

        <div class="form-group">

        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>태어난 시간</label>
          <select id="compat1Hour">
            <option value="-1">모름</option>
            <option value="0">자시 (23:30~01:30)</option>
            <option value="1">축시 (01:30~03:30)</option>
            <option value="3">인시 (03:30~05:30)</option>
            <option value="5">묘시 (05:30~07:30)</option>
            <option value="7">진시 (07:30~09:30)</option>
            <option value="9">사시 (09:30~11:30)</option>
            <option value="11">오시 (11:30~13:30)</option>
            <option value="13">미시 (13:30~15:30)</option>
            <option value="15">신시 (15:30~17:30)</option>
            <option value="17">유시 (17:30~19:30)</option>
            <option value="19">술시 (19:30~21:30)</option>
            <option value="21">해시 (21:30~23:30)</option>
          </select>
        </div>
      </div>

      <div class="person-divider">
        <div class="line"></div>
        <span class="heart">💕</span>
        <div class="line"></div>
      </div>

      <p class="section-title">두 번째 사람</p>
      <div class="gender-toggle">
        <button class="gender-btn" data-gender="male" onclick="selectGender(this, 'compat2')">👨 남성</button>
        <button class="gender-btn active" data-gender="female" onclick="selectGender(this, 'compat2')">👩 여성</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>태어난 해</label>
          <input type="number" id="compat2Year" placeholder="1992" min="1920" max="2025">
        </div>
        <div class="form-group">
          <label>월</label>
          <select id="compat2Month">
            <option value="">월</option>
            <option value="1">1월</option><option value="2">2월</option>
            <option value="3">3월</option><option value="4">4월</option>
            <option value="5">5월</option><option value="6">6월</option>
            <option value="7">7월</option><option value="8">8월</option>
            <option value="9">9월</option><option value="10">10월</option>
            <option value="11">11월</option><option value="12">12월</option>
          </select>
        </div>
        <div class="form-group">
          <label>일</label>
          <input type="number" id="compat2Day" placeholder="20" min="1" max="31">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>태어난 시간</label>
          <select id="compat2Hour">
            <option value="-1">모름</option>
            <option value="0">자시 (23:30~01:30)</option>
            <option value="1">축시 (01:30~03:30)</option>
            <option value="3">인시 (03:30~05:30)</option>
            <option value="5">묘시 (05:30~07:30)</option>
            <option value="7">진시 (07:30~09:30)</option>
            <option value="9">사시 (09:30~11:30)</option>
            <option value="11">오시 (11:30~13:30)</option>
            <option value="13">미시 (13:30~15:30)</option>
            <option value="15">신시 (15:30~17:30)</option>
            <option value="17">유시 (17:30~19:30)</option>
            <option value="19">술시 (19:30~21:30)</option>
            <option value="21">해시 (21:30~23:30)</option>
          </select>
        </div>
      </div>

      <div class="error-msg" id="compatError"></div>
      <button class="submit-btn" onclick="submitCompatibility()">궁합 보기</button>
    </div>
    <div id="compatResult"></div>
  </div>

  <!-- 신년운세 페이지 -->

        <div class="form-group">
          <label>월</label>

        <div class="form-group">

            <option value="3">인시 (03:30~05:30)</option>
            <option value="5">묘시 (05:30~07:30)</option>
            <option value="7">진시 (07:30~09:30)</option>

    </div>
    <div id="newyearResult"></div>
  </div>

  <!-- 하단 네비게이션 -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="openPage('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">홈</span>
    </button>
    <button class="nav-item" onclick="openPage('basic')">
      <span class="nav-icon">🔮</span>
      <span class="nav-label">사주</span>
    </button>
    <button class="nav-item" onclick="openPage('today')">
      <span class="nav-icon">📅</span>
      <span class="nav-label">오늘</span>
    </button>
    <button class="nav-item" onclick="openPage('compatibility')">
      <span class="nav-icon">💕</span>
      <span class="nav-label">궁합</span>
    </button>
    <button class="nav-item" onclick="openPage('newyear')">
      <span class="nav-icon">🎆</span>
      <span class="nav-label">신년</span>
    </button>
  </nav>

  <script src="/js/app.js"></script>
</body>
</html>
